name: Build Discord Bot Universal JAR & Upload

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permissions to gradlew
        run: chmod +x ./gradlew

      - name: Build your all-in-one JAR
        run: ./gradlew clean jar

      - name: Upload JAR as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetherLinkBot
          path: build/libs/NetherLinkBot.jar
          retention-days: 90